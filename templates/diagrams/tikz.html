<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TikZ Diagram</title>
    <link rel="stylesheet" type="text/css" href="https://tikzjax.com/v1/fonts.css">
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: rgb(255, 255, 255);
            font-family: sans-serif;
        }

        #viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
            position: relative;
        }

        #viewport:active {
            cursor: grabbing;
        }

        #graph {
            position: absolute;
            transform-origin: 0 0;
            display: inline-block;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: rgb(0, 0, 0);
            }
            #graph {
                filter: invert(1) hue-rotate(180deg);
            }
        }

        #graph svg {
            display: block;
            background-color: transparent;
        }

        script[type="text/tikz"] {
            display: none;
        }
    </style>
</head>
<body>
    <div id="viewport">
        <div id="graph"></div>
    </div>

    <div id="tikz-data" style="display: none">{{ tikz_code|json_script:"tikz-data" }}</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const viewport = document.getElementById('viewport');
            const graph = document.getElementById('graph');

            // Transform state
            let scale = 1;
            let translateX = 0;
            let translateY = 0;

            // Zoom constraints
            const MIN_SCALE = 0.1;
            const MAX_SCALE = 10;
            const ZOOM_SENSITIVITY = 0.001;

            // Pan state
            let isPanning = false;
            let startX = 0;
            let startY = 0;

            function updateTransform() {
                graph.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            }

            function centerGraph() {
                const svg = graph.querySelector('svg');
                if (!svg) return;

                const viewportRect = viewport.getBoundingClientRect();
                const svgRect = svg.getBoundingClientRect();

                const svgWidth = svgRect.width / scale;
                const svgHeight = svgRect.height / scale;

                translateX = (viewportRect.width - svgWidth * scale) / 2;
                translateY = (viewportRect.height - svgHeight * scale) / 2;

                updateTransform();
            }

            // Zoom at mouse position
            function zoomAtPoint(newScale, clientX, clientY) {
                newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));

                const viewportRect = viewport.getBoundingClientRect();
                const mouseX = clientX - viewportRect.left;
                const mouseY = clientY - viewportRect.top;

                const graphX = (mouseX - translateX) / scale;
                const graphY = (mouseY - translateY) / scale;

                scale = newScale;

                translateX = mouseX - graphX * scale;
                translateY = mouseY - graphY * scale;

                updateTransform();
            }

            // Mouse wheel zoom
            viewport.addEventListener('wheel', function(e) {
                e.preventDefault();
                const delta = -e.deltaY * ZOOM_SENSITIVITY;
                const newScale = scale * (1 + delta);
                zoomAtPoint(newScale, e.clientX, e.clientY);
            }, { passive: false });

            // Pan: Mouse down
            viewport.addEventListener('mousedown', function(e) {
                if (e.button !== 0) return;
                isPanning = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                viewport.style.cursor = 'grabbing';
            });

            // Pan: Mouse move
            viewport.addEventListener('mousemove', function(e) {
                if (!isPanning) return;
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                updateTransform();
            });

            // Pan: Mouse up
            viewport.addEventListener('mouseup', function() {
                isPanning = false;
                viewport.style.cursor = 'grab';
            });

            // Handle mouse leaving viewport while panning
            viewport.addEventListener('mouseleave', function() {
                isPanning = false;
                viewport.style.cursor = 'grab';
            });

            // Touch support
            let lastTouchDistance = 0;

            viewport.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    isPanning = true;
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY;
                } else if (e.touches.length === 2) {
                    isPanning = false;
                    lastTouchDistance = Math.hypot(
                        e.touches[1].clientX - e.touches[0].clientX,
                        e.touches[1].clientY - e.touches[0].clientY
                    );
                }
            }, { passive: true });

            viewport.addEventListener('touchmove', function(e) {
                e.preventDefault();

                if (e.touches.length === 1 && isPanning) {
                    translateX = e.touches[0].clientX - startX;
                    translateY = e.touches[0].clientY - startY;
                    updateTransform();
                } else if (e.touches.length === 2) {
                    const currentDistance = Math.hypot(
                        e.touches[1].clientX - e.touches[0].clientX,
                        e.touches[1].clientY - e.touches[0].clientY
                    );
                    const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                    const scaleFactor = currentDistance / lastTouchDistance;
                    zoomAtPoint(scale * scaleFactor, centerX, centerY);

                    lastTouchDistance = currentDistance;
                }
            }, { passive: false });

            viewport.addEventListener('touchend', function() {
                isPanning = false;
            });

            // Load TikZ diagram
            const dataElement = document.getElementById('tikz-data');
            if (dataElement) {
                try {
                    const rawCode = JSON.parse(dataElement.textContent);
                    const tikzScript = document.createElement('script');
                    tikzScript.type = 'text/tikz';
                    tikzScript.textContent = rawCode;
                    graph.appendChild(tikzScript);

                    // Center SVG when rendered
                    const observer = new MutationObserver(function(mutations) {
                        for (const mutation of mutations) {
                            for (const node of mutation.addedNodes) {
                                if (node.tagName === 'svg') {
                                    setTimeout(centerGraph, 100);
                                    observer.disconnect();
                                    return;
                                }
                            }
                        }
                    });

                    observer.observe(graph, { childList: true, subtree: true });

                } catch (e) {
                    console.error("Error parsing TikZ data:", e);
                    graph.innerText = "Error rendering diagram. Check console.";
                }
            }

            window.addEventListener('resize', centerGraph);
        });
    </script>
</body>
</html>
