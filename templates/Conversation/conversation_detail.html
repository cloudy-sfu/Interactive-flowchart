{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/glassmorphism.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .btn-custom {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s;
        }
        .btn-custom:hover {
            background-color: #0056b3;
            color: white;
        }
        /* Detail view specific styles */
        .main-container {
            flex-grow: 1;
            padding: 1rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chat-col, .diagram-col {
            height: 100%; /* Force columns to stay within row height */
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        .chat-messages {
            flex: 1 1 0; /* Grow, Shrink, Basis 0 - forces usage of available space */
            overflow-y: auto;
            min-height: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        /* Scrollbar styling for chat */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .message-bubble {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 85%;
            word-wrap: break-word;
        }
        /* message-user class citation in Jinja2, which IDE didn't recognize. */
        .message-user {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        /* message-ai class has citation in Jinja2, which IDE didn't recognize. */
        .message-ai {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: normal;
        }
        .message-ai p {
            margin-bottom: 0.5rem;
        }
        .message-ai p:last-child {
            margin-bottom: 0;
        }
        .message-ai table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0.5rem;
            font-size: 0.9em;
        }
        .message-ai th, .message-ai td {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
        }
        .message-ai th {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .chat-input-wrapper {
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-input-wrapper .btn {
            padding-top: 6px;
            padding-bottom: 6px;
        }
        .chat-input {
            resize: none;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }
        .chat-input:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: #007bff;
            box-shadow: none;
        }
        .diagram-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .diagram-header {
            padding: 0.5rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .diagram-content {
            flex-grow: 1;
            background-color: rgba(0, 0, 0, 0.2);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        iframe.diagram-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        .diagram-select {
            background-color: rgba(0, 0, 0, 0.3);
            min-width: 200px;
        }
        .diagram-select option {
            background-color: #1a1a1a;
            color: white;
        }
        .diagram-select:focus {
            background-color: rgba(0, 0, 0, 0.4);
            border-color: #007bff;
            box-shadow: none;
        }
        /* Responsive Breakpoints */
        @media (max-width: 991.98px) {
            body {
                overflow: auto;
                height: auto;
            }
            .main-container {
                height: auto;
                padding-bottom: 2rem;
            }
            .chat-col {
                height: 60vh; /* Fixed height for chat on tablet/mobile */
                margin-bottom: 2rem;
            }
            .diagram-col {
                height: 60vh; /* Fixed height for diagram on tablet/mobile */
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid main-container">
        <div class="row h-100 g-3">
            <!-- Chat Column (Left 1/3 on desktop) -->
            <div class="col-lg-4 chat-col">
                <div class="glass glass-rounded chat-container">
                    <div class="chat-header">
                        <h5 class="mb-0 text-white">{{ conversation.title|default:"New Conversation" }}</h5>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        {% for message in messages %}
                            <div class="message-bubble {% if message.role == 'U' %}message-user{% else %}message-ai{% endif %}">{{ message.content }}</div>
                        {% endfor %}
                    </div>
                    <div class="chat-input-wrapper">
                        <div class="d-flex gap-2 align-items-end">
                            <textarea class="form-control chat-input" id="chatInput" rows="1" placeholder="Type your message..."></textarea>
                            <button class="btn btn-custom rounded-pill" type="button" id="sendBtn">Send</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Diagram Column (Right 2/3 on desktop) -->
            <div class="col-lg-8 diagram-col">
                <div class="glass glass-rounded diagram-container">
                    <div class="diagram-header">
                        <div class="d-flex align-items-center gap-2">
                             <span class="fw-bold">Diagram Preview</span>
                             <select id="diagramSelect" class="form-select form-select-sm diagram-select" style="width: auto;" data-bs-theme="dark" {% if not diagrams %}disabled{% endif %}>
                                {% if diagrams %}
                                    {% for diagram in diagrams %}
                                        <option value="{{ diagram.id }}" {% if forloop.last %}selected{% endif %}>Version {{ forloop.counter }}</option>
                                    {% endfor %}
                                {% else %}
                                    <option selected>No Diagram</option>
                                {% endif %}
                            </select>
                             <button id="generateDiagramBtn" class="btn btn-sm btn-custom rounded-pill py-1 px-3">Generate Diagram</button>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                             <!-- Future buttons can go here -->
                             <a href="{% url 'conversation_list' %}" class="btn btn-sm btn-glass">Back</a>
                        </div>
                    </div>
                    <div class="diagram-content" id="diagramContainer">
                        {% if diagrams %}
                            <iframe id="diagramFrame" class="diagram-frame" srcdoc="{{ diagrams.last.content|escape }}"></iframe>
                        {% else %}
                            <div class="d-flex justify-content-center align-items-center h-100">
                                <span class="text-white-50">No Diagram</span>
                            </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="summaryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content glass" style="background: rgba(30, 30, 30, 0.95);">
          <div class="modal-header" style="border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
            <h5 class="modal-title">Edit Diagram Summary</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
             <form id="diagramForm" method="POST" action="{% url 'create_diagram' conversation.id %}">
                 {% csrf_token %}
                 <div class="mb-3">
                     <label for="summaryText" class="form-label">Summary Description</label>
                     <textarea class="form-control" id="summaryText" name="profile" rows="10" style="background: rgba(0, 0, 0, 0.3); color: white; border: 1px solid rgba(255, 255, 255, 0.2);"></textarea>
                 </div>
                 <div class="text-end">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Confirm</button>
                 </div>
             </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Error Toast -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
      <div id="errorToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" style="background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); color: white;">
        <div class="toast-header" style="background: rgba(255, 255, 255, 0.1); color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
          <strong class="me-auto">Notification</strong>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body" id="errorToastBody">
          <!-- Error message -->
        </div>
      </div>
    </div>

    <!-- Data for diagram switching -->
    <script>
        const diagramVersions = {
            {% for diagram in diagrams %}
                "{{ diagram.id }}": `{{ diagram.content|escapejs }}`,
            {% endfor %}
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const chatMessages = document.getElementById('chatMessages');
            const conversationId = "{{ conversation.id }}";
            const csrfToken = "{{ csrf_token }}";

            // Auto-resize input
            if (chatInput) {
                chatInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                });

                // Enter to send
                chatInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }

            if (sendBtn) {
                sendBtn.addEventListener('click', sendMessage);
            }

            function scrollToBottom() {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            // Initial scroll
            scrollToBottom();

            // Render existing AI messages markdown
            document.querySelectorAll('.message-ai').forEach(el => {
                if (typeof marked !== 'undefined') {
                    el.innerHTML = marked.parse(el.textContent);
                    // Open links in new tab
                    el.querySelectorAll('a').forEach(a => {
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                    });
                }
            });

            async function sendMessage() {
                const text = chatInput.value.trim();
                if (!text) return;

                // 1. Display User Message
                appendMessage(text, 'user');
                chatInput.value = '';
                chatInput.style.height = 'auto';

                // 2. Create AI Message Placeholder
                const aiMessageDiv = appendMessage('', 'ai');
                aiMessageDiv.innerHTML = '<em>Waiting response ...</em>';
                let isFirstChunk = true;
                let fullResponseText = "";

                try {
                    const response = await fetch(`/Conversation/chat_stream/${conversationId}/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrfToken
                        },
                        body: JSON.stringify({ message: text })
                    });

                    if (!response.ok) {
                         const errorJSON = await response.json().catch(() => ({}));
                         const errorMessage = errorJSON.error || `Server error: ${response.status}`;
                         throw new Error(errorMessage);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    let done = false;
                    while (!done) {
                        const { value, done: streamDone } = await reader.read();
                        done = streamDone;
                        if (done) break;

                        if (isFirstChunk) {
                            aiMessageDiv.textContent = ''; // Clear waiting message
                            isFirstChunk = false;
                        }

                        const chunk = decoder.decode(value, { stream: true });
                        fullResponseText += chunk;

                        // Render Markdown
                        if (typeof marked !== 'undefined') {
                             aiMessageDiv.innerHTML = marked.parse(fullResponseText);
                             // Open links in new tab
                             aiMessageDiv.querySelectorAll('a').forEach(a => {
                                 a.target = '_blank';
                                 a.rel = 'noopener noreferrer';
                             });
                        } else {
                             aiMessageDiv.textContent = fullResponseText;
                        }
                        scrollToBottom();

                        // Throttle rendering to reduce CPU usage
                        await new Promise(r => setTimeout(r, 200));
                    }

                } catch (error) {
                    // Stop Markdown rendering for error
                    const errorSpan = document.createElement('div');
                    errorSpan.style.color = '#ff6b6b';
                    errorSpan.textContent = (isFirstChunk ? '' : '\n') + error.message;
                    aiMessageDiv.appendChild(errorSpan);

                    scrollToBottom();
                }
            }

            function appendMessage(text, type) {
                const div = document.createElement('div');
                div.classList.add('message-bubble', type === 'user' ? 'message-user' : 'message-ai');
                div.textContent = text;
                chatMessages.appendChild(div);
                scrollToBottom();
                return div;
            }

            // Diagram switching logic
            const diagramSelect = document.getElementById('diagramSelect');
            const diagramFrame = document.getElementById('diagramFrame');

            if (diagramSelect && diagramFrame && typeof diagramVersions !== 'undefined') {
                diagramSelect.addEventListener('change', function() {
                    const selectedId = this.value;
                    const content = diagramVersions[selectedId];
                    if (content) {
                        diagramFrame.srcdoc = content;
                    }
                });
            }

            // Confirm Diagram Logic
            const diagramForm = document.getElementById('diagramForm');
            if (diagramForm) {
                diagramForm.addEventListener('submit', async function(e) {
                    e.preventDefault();

                    const submitBtn = diagramForm.querySelector('button[type="submit"]');
                    const originalText = submitBtn.textContent;
                    submitBtn.textContent = 'Drawing...';
                    submitBtn.disabled = true;

                    const formData = new FormData(diagramForm);

                    try {
                        const response = await fetch(diagramForm.action, {
                            method: 'POST',
                            body: formData,
                            headers: {
                                'X-Requested-With': 'XMLHttpRequest'
                            }
                        });
                        
                        const responseData = await response.json();

                        if (!response.ok) {
                            throw new Error(responseData.error || 'Failed to create diagram');
                        }

                        // Success - Update UI without reload
                        if (responseData.diagram && typeof diagramVersions !== 'undefined') {
                            // Update data
                            diagramVersions[responseData.diagram.id] = responseData.diagram.content;

                            // Update Select
                             const diagramSelect = document.getElementById('diagramSelect');
                             if (diagramSelect) {
                                  // Remove "No Diagram" if exists
                                  if (diagramSelect.options.length > 0 && diagramSelect.options[0].textContent === 'No Diagram') {
                                      diagramSelect.innerHTML = '';
                                      diagramSelect.disabled = false;
                                  }
                                  
                                  const option = document.createElement('option');
                                  option.value = responseData.diagram.id;
                                  option.textContent = `Version ${Object.keys(diagramVersions).length}`;
                                  option.selected = true;
                                  diagramSelect.appendChild(option);
                                  
                                  // Trigger update
                                  diagramSelect.dispatchEvent(new Event('change'));
                             }
                        }
                        
                        // Hide Modal
                        const summaryModalEl = document.getElementById('summaryModal');
                        const summaryModal = bootstrap.Modal.getInstance(summaryModalEl);
                        if (summaryModal) {
                            summaryModal.hide();
                        }

                    } catch (error) {
                        const errorToastEl = document.getElementById('errorToast');
                        const errorToastBody = document.getElementById('errorToastBody');
                        if (errorToastEl && errorToastBody) {
                             errorToastBody.textContent = error.message;
                             const toast = bootstrap.Toast.getOrCreateInstance(errorToastEl);
                             toast.show();
                        } else {
                             alert(error.message);
                        }

                        // Reset button
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;
                    }
                });
            }

            // Generate Diagram Logic
            const generateBtn = document.getElementById('generateDiagramBtn');

            if (generateBtn) {
                generateBtn.addEventListener('click', async function() {
                    // Show loading state
                    const originalText = generateBtn.textContent;
                    generateBtn.textContent = 'Summarizing...';
                    generateBtn.disabled = true;

                    try {
                        const response = await fetch("{% url 'generate_summary' conversation.id %}", {
                            method: 'POST',
                            headers: {
                                'X-CSRFToken': csrfToken
                            }
                        });

                        if (!response.ok) {
                             const data = await response.json().catch(() => ({}));
                             throw new Error(data.error || 'Failed to generate summary');
                        }

                        const data = await response.json();
                        const summaryText = document.getElementById('summaryText');
                        const summaryModalEl = document.getElementById('summaryModal');
                        const summaryModal = bootstrap.Modal.getOrCreateInstance(summaryModalEl);

                        summaryText.value = data.summary;
                        summaryModal.show();

                    } catch (error) {
                        const errorToastEl = document.getElementById('errorToast');
                        const errorToastBody = document.getElementById('errorToastBody');
                        if (errorToastEl && errorToastBody) {
                             errorToastBody.textContent = error.message;
                             const toast = bootstrap.Toast.getOrCreateInstance(errorToastEl);
                             toast.show();
                        } else {
                             alert(error.message);
                        }
                    } finally {
                        generateBtn.textContent = originalText;
                        generateBtn.disabled = false;
                    }
                });
            }
        });
    </script>
</body>
</html>
