{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/glassmorphism.css' %}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
        .card.glass {
            transition: transform 0.2s;
        }
        .card.glass:hover {
            transform: translateY(-5px);
        }
        .card-meta {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .btn-custom {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s;
        }
        .btn-custom:hover {
            background-color: #0056b3;
            color: white;
        }
        .btn-secondary-custom {
            background-color: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--glass-text);
        }
        .btn-secondary-custom:hover {
             background-color: var(--glass-btn-hover-bg);
             color: var(--glass-text);
        }
        .btn-delete {
            color: var(--glass-text);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.7;
        }
        .btn-delete:hover {
            color: white;
            background: rgba(220, 53, 69, 0.8);
            border-color: rgba(220, 53, 69, 0.5);
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.4);
            transform: rotate(90deg);
            opacity: 1;
        }
    </style>
</head>
<body>
    <nav class="navbar glass mb-4">
        <div class="container d-flex justify-content-between align-items-center" style="padding-top: 0; padding-bottom: 0;">
            <a href="#" class="text-glass text-decoration-none h4 mb-0">Interactive Flowchart</a>
            <div>
                {% if user.is_staff %}
                    <a href="/admin" class="btn-custom btn-secondary-custom me-2">Admin</a>
                {% endif %}
                <a href="{% url 'logout' %}" class="btn-custom btn-secondary-custom">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">Conversations</h3>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col">
                <a class="card glass h-100 position-relative" href="{% url 'create_conversation' %}"
                   style="text-decoration: none;">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <span class="text-glass fst-italic text-center">Create a new conversation</span>
                    </div>
                </a>
            </div>
            {% for conversation in conversations %}
            <div class="col">
                <div class="card glass h-100 position-relative">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title text-truncate me-2">
                                <a href="{% url 'conversation_detail' conversation.id %}" class="text-decoration-none text-glass stretched-link">
                                    {{ conversation.title|default:"New conversation" }}
                                </a>
                            </h5>
                            <form action="{% url 'delete_conversation' conversation.id %}" method="post" class="position-relative" style="z-index: 2;">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-sm btn-delete" onclick="return confirm('Are you sure you want to delete this conversation?');" title="Delete conversation">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </form>
                        </div>
                        <div class="card-text mt-3">
                            <div class="card-meta">
                                Created:
                                <span class="local-time" data-timestamp="{{ conversation.created_time|date:'c' }}"></span>
                            </div>
                            <div class="card-meta">
                                Modified:
                                <span class="local-time" data-timestamp="{{ conversation.modified_time|date:'c' }}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const timeElements = document.querySelectorAll('.local-time');
            timeElements.forEach(el => {
                const timestamp = el.getAttribute('data-timestamp');
                if (timestamp) {
                    const date = new Date(timestamp);
                    // Mock ISO + GMT time zone
                    el.textContent = date.toLocaleString('sv-SE', {timeZoneName: 'shortOffset'});
                }
            });
        });
    </script>
</body>
</html>
